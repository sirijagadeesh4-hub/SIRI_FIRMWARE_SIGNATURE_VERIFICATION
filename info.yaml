# Tiny Tapeout project information
project:
  title:        "UART SoC"      
  author:       "Your Name"      
  discord:      ""      
  description:  "7-bit UART serial receiver SoC for Tiny Tapeout"      
  language:     "Verilog"
  clock_hz:     1000000

  # Tile size
  tiles: "1x1"

  # Top module name
  top_module:  "tt_um_example"

  # Source files
  source_files:
    - "project.v"

# Pinout information
pinout:
  # Inputs
  ui[0]: "UART serial input"
  ui[1]: "Unused"
  ui[2]: "Unused"
  ui[3]: "Unused"
  ui[4]: "Unused"
  ui[5]: "Unused"
  ui[6]: "Unused"
  ui[7]: "Unused"

  # Outputs
  uo[0]: "UART data bit 0"
  uo[1]: "UART data bit 1"
  uo[2]: "UART data bit 2"
  uo[3]: "UART data bit 3"
  uo[4]: "UART data bit 4"
  uo[5]: "UART data bit 5"
  uo[6]: "UART data bit 6"
  uo[7]: "Done signal"

  # Bidirectional pins
  uio[0]: "Done output"
  uio[1]: "Unused"
  uio[2]: "Unused"
  uio[3]: "Unused"
  uio[4]: "Unused"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

# Do not change!
yaml_version: 6
